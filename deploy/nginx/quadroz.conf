upstream quadroz_backend {
  server 127.0.0.1:3000;
  keepalive 16;
}

server {
  listen 80;
  server_name _;

  # Gzip no nível do servidor (não dentro de location)
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css application/json application/javascript image/svg+xml text/xml application/xml;
  gzip_min_length 1024;

  # Servir arquivos estáticos diretamente do dist/public
  location ~* \.(js|css|svg|png|webp|woff2|ico|jpg|jpeg)$ {
    root /root/Quadroz/dist/public;
    gzip_static on;
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable";
    add_header X-Static hit;
    
    # Se não encontrar, fazer proxy
    try_files $uri @proxy;
  }

  location @proxy {
    proxy_pass http://quadroz_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
  }

  location / {
    proxy_pass http://quadroz_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
  }

  location /api/image-proxy {
    proxy_pass http://quadroz_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Cache de borda pronto para CDN (Cloudflare).
    proxy_cache_valid 200 30d;
    add_header Cache-Control "public, max-age=2592000, stale-while-revalidate=604800" always;
  }
}